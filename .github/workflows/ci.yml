name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agent13-frontend/package-lock.json
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Run Tests
        run: dotnet test
      - name: Verify npm build script exists
        working-directory: agent13-frontend
        run: |
          jq -e '.scripts.build' package.json > /dev/null || { echo "Error: 'build' script not found in agent13-frontend/package.json"; exit 1; }
          echo "Build script verified."
      - name: Install Frontend
        working-directory: agent13-frontend
        run: npm install
      - name: Build Frontend
        working-directory: agent13-frontend
        run: npm run build
      - name: Copy Frontend to wwwroot
        run: |
          mkdir -p src/wwwroot
          rm -rf src/wwwroot/*
          cp -r agent13-frontend/dist/. src/wwwroot/
      - name: Publish Backend
        run: dotnet publish ./src/LegalRagApp.csproj -c Release -o ./publish-backend
      - name: Package Backend Artifact
        run: |
          cd publish-backend
          zip -r ../backend-publish.zip .
      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: backend-publish.zip
          if-no-files-found: error
          retention-days: 7
      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: agent13-frontend/dist
          if-no-files-found: error
          retention-days: 7
