name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Run Tests
        run: dotnet test
      - name: Publish Backend
        run: dotnet publish ./src/LegalRagApp.csproj -c Release -o ./publish-backend
      - name: Package Backend Artifact
        run: |
          cd publish-backend
          zip -r ../backend-publish.zip .
      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: backend-publish.zip
          if-no-files-found: error
          retention-days: 7
      - name: Install Frontend
        working-directory: agent13-frontend
        run: npm install

      - name: Build Frontend
        working-directory: agent13-frontend
        run: npm run build
      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: agent13-frontend/dist
          if-no-files-found: error
          retention-days: 7
