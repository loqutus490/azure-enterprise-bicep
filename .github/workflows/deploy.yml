name: Deploy Infrastructure

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify Azure Subscription
        run: az account show --query "{name:name,id:id,tenantId:tenantId}" -o table

      - name: Validate Bicep
        run: |
          az bicep build --file infra/main.bicep

      - name: Deploy to Azure
        run: |
          az group create \
            --name rg-legal-${{ env.ENVIRONMENT }} \
            --location westus3 \
            --output none

          az deployment group create \
            --resource-group rg-legal-${{ env.ENVIRONMENT }} \
            --template-file infra/main.bicep \
            --parameters infra/params/${{ env.ENVIRONMENT }}.bicepparam
