name: Deploy Infrastructure

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
      - release

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  deploy-dev:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    environment: dev

    env:
      ENVIRONMENT: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Validate Azure OIDC Inputs
        run: |
          set -euo pipefail

          [[ -n "${{ vars.AZURE_CLIENT_ID }}" ]] || { echo "Missing variable: AZURE_CLIENT_ID"; exit 1; }
          [[ -n "${{ vars.AZURE_TENANT_ID }}" ]] || { echo "Missing variable: AZURE_TENANT_ID"; exit 1; }
          [[ -n "${{ vars.AZURE_SUBSCRIPTION_ID }}" ]] || { echo "Missing variable: AZURE_SUBSCRIPTION_ID"; exit 1; }

          echo "Azure OIDC inputs present for environment '${{ env.ENVIRONMENT }}'."

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          allow-no-subscriptions: true

      - name: Set and Verify Azure Subscription
        run: |
          set -euo pipefail
          az account set --subscription "${{ vars.AZURE_SUBSCRIPTION_ID }}"
          az account show --query "{name:name,id:id,tenantId:tenantId}" -o table

      - name: Validate Bicep
        run: |
          az bicep build --file infra/main.bicep

      - name: Deploy Infrastructure
        id: deploy_infra
        run: |
          set -euo pipefail

          RESOURCE_GROUP="rg-legal-${{ env.ENVIRONMENT }}"
          DEPLOYMENT_NAME="infra-${{ env.ENVIRONMENT }}-${{ github.run_id }}"

          az group create \
            --name "$RESOURCE_GROUP" \
            --location westus3 \
            --output none

          az deployment group create \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters infra/params/${{ env.ENVIRONMENT }}.bicepparam \
            --parameters deployRoleAssignments=false \
            --output none

          deployment_output="$(az deployment group show \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.outputs.appUrl.value" \
            -o tsv)"

          if [[ -z "$deployment_output" || "$deployment_output" == "null" ]]; then
            deployment_output="$(az deployment group show \
              --name "$DEPLOYMENT_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --query "properties.outputs.appServiceUrl.value" \
              -o tsv)"
          fi

          if [[ -z "$deployment_output" || "$deployment_output" == "null" ]]; then
            echo "Deployment output appUrl is empty."
            echo "Deployment outputs were:"
            az deployment group show \
              --name "$DEPLOYMENT_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --query "properties.outputs" \
              -o json
            exit 1
          fi

          echo "app_url=$deployment_output" >> "$GITHUB_OUTPUT"

      - name: Download Backend Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-publish-${{ github.event.workflow_run.head_sha }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./artifacts/backend

      - name: Resolve Web App
        id: resolve_app
        run: |
          APP_URL="${{ steps.deploy_infra.outputs.app_url }}"
          WEBAPP_NAME="$(echo "$APP_URL" | sed -E 's#^https://([^./]+).*#\\1#')"

          if [[ -z "$WEBAPP_NAME" ]]; then
            echo "Unable to derive Web App name from appUrl output: $APP_URL"
            exit 1
          fi

          echo "name=$WEBAPP_NAME" >> "$GITHUB_OUTPUT"

      - name: Deploy Backend Artifact
        run: |
          RESOURCE_GROUP="rg-legal-${{ env.ENVIRONMENT }}"
          WEBAPP_NAME="${{ steps.resolve_app.outputs.name }}"
          ARTIFACT_PATH="./artifacts/backend/backend-publish.zip"

          if [[ ! -f "$ARTIFACT_PATH" ]]; then
            echo "Backend artifact not found at $ARTIFACT_PATH"
            exit 1
          fi

          az webapp deploy \
            --resource-group "$RESOURCE_GROUP" \
            --name "$WEBAPP_NAME" \
            --src-path "$ARTIFACT_PATH" \
            --type zip \
            --output none

          az webapp restart \
            --name "$WEBAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --output none

      - name: Validate Deployment Health
        run: |
          set -euo pipefail

          RESOURCE_GROUP="rg-legal-${{ env.ENVIRONMENT }}"
          WEBAPP_NAME="${{ steps.resolve_app.outputs.name }}"

          echo "Validating Web App resource: $WEBAPP_NAME"
          az webapp show --name "$WEBAPP_NAME" --resource-group "$RESOURCE_GROUP" --query "{name:name,state:state,host:defaultHostName}" -o table

          HEALTH_URL="https://${WEBAPP_NAME}.azurewebsites.net/ping"
          echo "Probing health endpoint: $HEALTH_URL"

          for attempt in {1..10}; do
            status_code="$(curl -sS -o /tmp/health_response.txt -w "%{http_code}" "$HEALTH_URL" || true)"

            if [[ "$status_code" == "200" || "$status_code" == "401" || "$status_code" == "403" ]]; then
              echo "Health probe passed with status: $status_code"
              exit 0
            fi

            echo "Attempt $attempt/10: unexpected status '$status_code'. Retrying in 10s..."
            sleep 10
          done

          echo "Health probe failed after retries."
          cat /tmp/health_response.txt || true
          exit 1

  deploy-prod:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'release' }}
    runs-on: ubuntu-latest
    environment: prod

    env:
      ENVIRONMENT: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Validate Azure OIDC Inputs
        run: |
          set -euo pipefail

          [[ -n "${{ vars.AZURE_CLIENT_ID }}" ]] || { echo "Missing variable: AZURE_CLIENT_ID"; exit 1; }
          [[ -n "${{ vars.AZURE_TENANT_ID }}" ]] || { echo "Missing variable: AZURE_TENANT_ID"; exit 1; }
          [[ -n "${{ vars.AZURE_SUBSCRIPTION_ID }}" ]] || { echo "Missing variable: AZURE_SUBSCRIPTION_ID"; exit 1; }

          echo "Azure OIDC inputs present for environment '${{ env.ENVIRONMENT }}'."

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          allow-no-subscriptions: true

      - name: Set and Verify Azure Subscription
        run: |
          set -euo pipefail
          az account set --subscription "${{ vars.AZURE_SUBSCRIPTION_ID }}"
          az account show --query "{name:name,id:id,tenantId:tenantId}" -o table

      - name: Validate Bicep
        run: |
          az bicep build --file infra/main.bicep

      - name: Deploy Infrastructure
        id: deploy_infra
        run: |
          set -euo pipefail

          RESOURCE_GROUP="rg-legal-${{ env.ENVIRONMENT }}"
          DEPLOYMENT_NAME="infra-${{ env.ENVIRONMENT }}-${{ github.run_id }}"

          az group create \
            --name "$RESOURCE_GROUP" \
            --location westus3 \
            --output none

          az deployment group create \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters infra/params/${{ env.ENVIRONMENT }}.bicepparam \
            --parameters deployRoleAssignments=false \
            --output none

          deployment_output="$(az deployment group show \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.outputs.appUrl.value" \
            -o tsv)"

          if [[ -z "$deployment_output" || "$deployment_output" == "null" ]]; then
            deployment_output="$(az deployment group show \
              --name "$DEPLOYMENT_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --query "properties.outputs.appServiceUrl.value" \
              -o tsv)"
          fi

          if [[ -z "$deployment_output" || "$deployment_output" == "null" ]]; then
            echo "Deployment output appUrl is empty."
            echo "Deployment outputs were:"
            az deployment group show \
              --name "$DEPLOYMENT_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --query "properties.outputs" \
              -o json
            exit 1
          fi

          echo "app_url=$deployment_output" >> "$GITHUB_OUTPUT"

      - name: Download Backend Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-publish-${{ github.event.workflow_run.head_sha }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./artifacts/backend

      - name: Resolve Web App
        id: resolve_app
        run: |
          APP_URL="${{ steps.deploy_infra.outputs.app_url }}"
          WEBAPP_NAME="$(echo "$APP_URL" | sed -E 's#^https://([^./]+).*#\\1#')"

          if [[ -z "$WEBAPP_NAME" ]]; then
            echo "Unable to derive Web App name from appUrl output: $APP_URL"
            exit 1
          fi

          echo "name=$WEBAPP_NAME" >> "$GITHUB_OUTPUT"

      - name: Deploy Backend Artifact
        run: |
          RESOURCE_GROUP="rg-legal-${{ env.ENVIRONMENT }}"
          WEBAPP_NAME="${{ steps.resolve_app.outputs.name }}"
          ARTIFACT_PATH="./artifacts/backend/backend-publish.zip"

          if [[ ! -f "$ARTIFACT_PATH" ]]; then
            echo "Backend artifact not found at $ARTIFACT_PATH"
            exit 1
          fi

          az webapp deploy \
            --resource-group "$RESOURCE_GROUP" \
            --name "$WEBAPP_NAME" \
            --src-path "$ARTIFACT_PATH" \
            --type zip \
            --output none

          az webapp restart \
            --name "$WEBAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --output none

      - name: Validate Deployment Health
        run: |
          set -euo pipefail

          RESOURCE_GROUP="rg-legal-${{ env.ENVIRONMENT }}"
          WEBAPP_NAME="${{ steps.resolve_app.outputs.name }}"

          echo "Validating Web App resource: $WEBAPP_NAME"
          az webapp show --name "$WEBAPP_NAME" --resource-group "$RESOURCE_GROUP" --query "{name:name,state:state,host:defaultHostName}" -o table

          HEALTH_URL="https://${WEBAPP_NAME}.azurewebsites.net/ping"
          echo "Probing health endpoint: $HEALTH_URL"

          for attempt in {1..10}; do
            status_code="$(curl -sS -o /tmp/health_response.txt -w "%{http_code}" "$HEALTH_URL" || true)"

            if [[ "$status_code" == "200" || "$status_code" == "401" || "$status_code" == "403" ]]; then
              echo "Health probe passed with status: $status_code"
              exit 0
            fi

            echo "Attempt $attempt/10: unexpected status '$status_code'. Retrying in 10s..."
            sleep 10
          done

          echo "Health probe failed after retries."
          cat /tmp/health_response.txt || true
          exit 1
